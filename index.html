<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poke Ripper</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { background: #050505; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; position: relative; font-family: 'Segoe UI', Tahoma, sans-serif; }
    #bg-tiles { position: absolute; top: -20%; left: -20%; width: 140%; height: 140%; z-index: -1; background-repeat: repeat; background-size: 250px; filter: blur(15px); opacity: 0.3; transform: rotate(-15deg); transition: background-image 0.5s ease; }
    
    #display { z-index: 10; text-align: center; margin-right: 320px; position: relative; opacity: 0; }
    img#card-img { max-height: 80vh; border-radius: 15px; box-shadow: 0 30px 60px rgba(0,0,0,1); position: relative; z-index: 2; }

    /* --- ANIMATIONS --- */
    @keyframes shake {
      0% { transform: rotate(0deg); }
      25% { transform: rotate(-3deg); }
      50% { transform: rotate(3deg); }
      75% { transform: rotate(-3deg); }
      100% { transform: rotate(0deg); }
    }
    .is-shaking { animation: shake 0.3s ease-in-out infinite; pointer-events: none; filter: brightness(1.2); }

    @keyframes cardPop {
      0% { transform: scale(0.3) translateY(100px); opacity: 0; }
      60% { transform: scale(1.05) translateY(-10px); opacity: 1; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }
    .is-popping { animation: cardPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

    /* Sidebar Binder */
    #sidebar-binder { position: fixed; top: 0; right: 0; width: 320px; height: 100%; background: rgba(10, 10, 10, 0.95); border-left: 1px solid #333; z-index: 1000; overflow-y: auto; padding: 20px; box-sizing: border-box; backdrop-filter: blur(10px); color: white; display: flex; flex-direction: column; }
    
    .sidebar-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; margin-bottom: 15px; min-height: 40px; }
    
    /* New Card Info Display */
    #card-info-display { display: flex; flex-direction: column; justify-content: center; border-left: 4px solid #444; padding-left: 12px; transition: border-color 0.3s ease; }
    #info-status { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; margin: 0; font-weight: bold; color: #aaa; transition: color 0.3s ease; }
    #info-details { margin: 4px 0 0 0; font-weight: 800; font-size: 14px; color: #eee; }

    /* Fixed Tap Target for Mobile Cogwheel */
    #settings-btn { cursor: pointer; font-size: 24px; opacity: 0.8; transition: opacity 0.2s, transform 0.4s ease; user-select: none; padding: 15px; margin: -15px; position: relative; z-index: 2000; }
    #settings-btn:hover { opacity: 1; transform: rotate(90deg); }

    /* Button Layout */
    #pack-btn {
      width: 100%;
      padding: 15px;
      margin-bottom: 20px;
      font-size: 18px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #a855f7, #ec4899);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      transition: transform 0.2s, box-shadow 0.2s;
      flex-shrink: 0;
    }
    #pack-btn:hover:not(.is-shaking) { transform: scale(1.02); box-shadow: 0 15px 40px rgba(236, 72, 153, 0.4); }
    #pack-btn:active:not(.is-shaking) { transform: scale(0.98); }

    /* Modals */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 3000; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }
    .modal-box { background: #111; border: 1px solid #333; border-top: 4px solid #a855f7; border-radius: 12px; padding: 25px; width: 300px; text-align: center; color: white; box-shadow: 0 20px 50px rgba(0,0,0,1); transform: translateY(20px) scale(0.95); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .modal-overlay.active .modal-box { transform: translateY(0) scale(1); }
    .modal-box h3 { margin-top: 0; text-transform: uppercase; letter-spacing: 2px; font-size: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
    .modal-box p { font-size: 14px; color: #aaa; margin-bottom: 20px; }
    
    .modal-btn { background: #222; color: white; border: 1px solid #444; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; box-sizing: border-box; margin-bottom: 10px; transition: background 0.2s; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; }
    .modal-btn:hover { background: #333; }
    .modal-btn.primary { background: linear-gradient(135deg, #a855f7, #3b82f6); border: none; }
    .modal-btn.primary:hover { filter: brightness(1.2); }
    .modal-btn.danger { background: rgba(239, 68, 68, 0.1); border-color: #ef4444; color: #ef4444; }
    .modal-btn.danger:hover { background: #ef4444; color: white; }

    /* Pokedex Styles */
    .gen-wrapper { margin-bottom: 20px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; }
    .gen-header { cursor: pointer; padding: 15px; font-weight: bold; text-transform: uppercase; font-size: 11px; letter-spacing: 2px; list-style: none; background: rgba(255,255,255,0.03); border-bottom: 2px solid var(--spine-color); color: var(--spine-color); text-align: center; }
    .era-mega { --spine-color: #10b981; } .era-sv { --spine-color: #a855f7; } .era-swsh { --spine-color: #3b82f6; } .era-sm { --spine-color: #ec4899; } .era-classic { --spine-color: #facc15; }
    .set-item { margin: 8px; border-radius: 4px; overflow: hidden; }
    .set-item summary { list-style: none; cursor: pointer; padding: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--spine-color); background: rgba(0,0,0,0.3); font-size: 11px; }
    .set-label { font-weight: 800; text-transform: uppercase; color: #eee; }
    .set-count { font-weight: bold; color: var(--spine-color); font-size: 10px; }
    .mini-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; padding: 10px; background: rgba(0,0,0,0.5); }
    .mini-grid img { width: 100%; border-radius: 2px; cursor: pointer; transition: transform 0.1s; }
    .mini-grid img:hover { transform: scale(1.3); z-index: 1001; outline: 2px solid var(--spine-color); }
    ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: #333; }

    /* Mobile Layout Adjustment */
    @media (max-width: 768px) {
      body { flex-direction: column; }
      #display { margin-right: 0; height: 50vh; display: flex; align-items: center; justify-content: center; width: 100%; }
      img#card-img { max-height: 45vh; }
      #sidebar-binder { position: relative; width: 100%; height: 50vh; border-left: none; border-top: 1px solid #333; padding-bottom: 50px; }
    }
  </style>
</head>
<body>
  <div id="bg-tiles"></div>
  
  <div id="display"><img id="card-img" src=""></div>
  
  <div id="sidebar-binder">
    <div class="sidebar-header">
      <div id="card-info-display">
        <p id="info-status">POKE RIPPER</p>
        <p id="info-details">Ready to pull!</p>
      </div>
      <div id="settings-btn" title="Settings">⚙️</div>
    </div>
    
    <button id="pack-btn">💥 Rip Pack</button>
    <div id="binder-content"></div>
  </div>

  <div id="settings-modal" class="modal-overlay">
    <div class="modal-box">
      <h3>Settings</h3>
      <button id="install-app-btn" class="modal-btn primary" style="display: none;">📱 Install App</button>
      <button id="open-clear-modal-btn" class="modal-btn danger">🗑️ Clear Pokedex</button>
      <button id="close-settings-btn" class="modal-btn">Close</button>
    </div>
  </div>

  <div id="confirm-clear-modal" class="modal-overlay">
    <div class="modal-box" style="border-top-color: #ef4444;">
      <h3>Warning</h3>
      <p>Are you sure you want to delete all your collected cards? This cannot be undone.</p>
      <button id="confirm-clear-btn" class="modal-btn danger">Yes, Delete Everything</button>
      <button id="cancel-clear-btn" class="modal-btn">Cancel</button>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
  <script src="script.js"></script>
</body>
</html>
